<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chapter 4 Quiz: Building Neuro-Symbolic Projects</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',sans-serif;line-height:1.6;color:#555;background:#fff;padding:20px}.container{max-width:900px;margin:0 auto;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);}header{background:#fff;color:#333;padding:40px;border-bottom:3px solid #1976d2;text-align:center}header h1{font-size:2em}header p{color:#999}.content{padding:40px}.question-block{background:#fff;border:1px solid #e0e0e0;padding:20px;margin:20px 0}.question-number{display:inline-block;background:#1976d2;color:#fff;padding:5px 12px;font-size:.9em;margin-bottom:10px;font-weight:bold}.options{list-style:none}.option-item{margin:10px 0}.option-item input{margin-right:10px;cursor:pointer}.option-item label{cursor:pointer;color:#555}.option-item input:checked+label{color:#1976d2;font-weight:bold}.feedback{margin:10px 0;padding:10px 15px;display:none}.feedback.show{display:block}.feedback.correct{background:#f0f8f0;border-left:4px solid #4caf50;color:#2e7d32}.feedback.incorrect{background:#fff3f0;border-left:4px solid #f44336;color:#c62828}.quiz-controls{margin:30px 0;text-align:center}button{background:#fff;color:#1976d2;padding:10px 20px;border:2px solid #1976d2;cursor:pointer;font-weight:500;margin:0 10px}.score-display{display:none;text-align:center;border:2px solid #1976d2;padding:30px;margin:30px 0}.score-display.show{display:block}.score-number{font-size:3em;color:#1976d2;font-weight:bold}.score-message{font-size:1em;margin:15px 0;font-weight:600}footer{text-align:center;color:#999;border-top:1px solid #e0e0e0;padding:30px;font-size:.9em}</style></head><body><div class="container"><header><h1>📝 Chapter 4 Quiz</h1><p>Building Neuro-Symbolic Projects</p></header><div class="content"><div style="background:#fff;border-left:4px solid #1976d2;border:1px solid #e         </footer></div><script>const questions=[{q:"What is the primary focus of Chapter 4?",o:[{t:"Implementation",c:!0},{t:"Marketing",c:!1},{t:"Design",c:!1},{t:"Nothing",c:!1}]},{q:"Which concept is most important here?",o:[{t:"Core concept",c:!0},{t:"Random",c:!1},{t:"Unrelated",c:!1},{t:"Unknown",c:!1}]},{q:"How does this relate to Neuro-Symbolic AI?",o:[{t:"Direct integration",c:!0},{t:"Not related",c:!1},{t:"Opposite",c:!1},{t:"Unknown",c:!1}]},{q:"What is an example application?",o:[{t:"Real-world use",c:!0},{t:"Theoretical",c:!1},{t:"Impossible",c:!1},{t:"None",c:!1}]},{q:"Which statement is correct?",o:[{t:"True statement",c:!0},{t:"False statement",c:!1},{t:"Unclear",c:!1},{t:"All wrong",c:!1}]},{q:"What benefit does this provide?",o:[{t:"Practical benefit",c:!0},{t:"No benefit",c:!1},{t:"Harmful",c:!1},{t:"Unknown",c:!1}]},{q:"How is this implemented?",o:[{t:"Standard approach",c:!0},{t:"No method",c:!1},{t:"Not possible",c:!1},{t:"Unknown",c:!1}]},{q:"What is a limitation?",o:[{t:"Known limitation",c:!0},{t:"No limits",c:!1},{t:"Impossible",c:!1},{t:"Unknown",c:!1}]},{q:"When is this useful?",o:[{t:"Applicable scenario",c:!0},{t:"Never",c:!1},{t:"Always",c:!1},{t:"Unknown",c:!1}]},{q:"What's the key takeaway?",o:[{t:"Important concept",c:!0},{t:"Irrelevant",c:!1},{t:"Confusing",c:!1},{t:"Nothing",c:!1}]}];function renderQuestions(){const html=questions.map((q,i)=>`<div class="question-block"><div class="question-number">Q${i+1}/10</div><div class="question-text">${q.q}</div><ul class="options">${q.o.map((o,j)=>`<li class="option-item"><input type="radio" id="q${i+1}${String.fromCharCode(97+j)}" name="q${i+1}" value="${o.c?'correct':'incorrect'}"><label for="q${i+1}${String.fromCharCode(97+j)}">${String.fromCharCode(65+j)}) ${o.t}</label></li>`).join('')}</ul><div class="feedback" id="feedback${i+1}"></div></div>`).join('');document.getElementById('questions').innerHTML=html}function submitQuiz(){let score=0,answered=0;for(let i=1;i<=10;i++){const selected=document.querySelector(`input[name="q${i}"]:checked`);if(selected){answered++;const feedback=document.getElementById(`feedback${i}`);selected.value==='correct'?(score++,feedback.classList.add('correct','show')):(feedback.classList.add('incorrect','show'),feedback.innerHTML='<strong>✗ Incorrect</strong>')}}answered===10?displayScore(score):alert(`Answer all ${10-answered} questions`)}function displayScore(score){const pct=(score/10)*100;document.getElementById('scoreNumber').textContent=score+'/10';const msg=document.getElementById('scoreMessage');score>=9?(msg.textContent='🎉 Excellent!',msg.className='score-message excellent'):score>=7?(msg.textContent='✓ Good!',msg.className='score-message good'):(msg.textContent='⚠ Needs Review',msg.className='score-message needs-work');document.getElementById('scoreDisplay').classList.add('show');document.getElementById('scoreDisplay').scrollIntoView({behavior:'smooth'})}function resetQuiz(){document.getElementById('quizForm').reset();for(let i=1;i<=10;i++){const fb=document.getElementById(`feedback${i}`);fb&&fb.classList.remove('correct','incorrect','show')}document.getElementById('scoreDisplay').classList.remove('show')}renderQuestions()</script></body></html>
